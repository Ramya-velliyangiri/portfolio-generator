<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Form</title>
    <link rel="stylesheet" href="form-style.css"
    
</head>
<body>

    <h1 class="form-title">Portfolio Details</h1>

    <div class="form-container">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="role" placeholder="Role">
        <textarea id="about" placeholder="About Me"></textarea>
        <input type="text" id="skills" placeholder="Skills">
        <input type="text" id="projects" placeholder="Projects">
        <input type="text" id="education" placeholder="Education">
        <input type="text" id="contacts" placeholder="Contacts">
        <input type="text" id="github" placeholder="GitHub">
        <input type="text" id="certificate" placeholder="Certificate">
        
        <input type="file" id="photo">
        
        <button id="generateBtn">Generate Portfolio</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
